<footer class="footer-zone">
    <section class="footer-card log-section">
        <div class="card-header">
            <div class="tabs">
                <span class="tab active">실시간 시스템 로그 (자동 기록 중...)</span>
            </div>
            <div class="mode-switch-group">
                <button class="m-btn track" onclick="changeMode('TRACK')">자동 추적</button>
                <button class="m-btn manual" onclick="changeMode('MANUAL')">수동 제어</button>
            </div>
        </div>
        <div class="log-table-wrapper" id="log-wrapper">
            <table class="log-table">
                <thead>
                    <tr>
                        <th style="width: 140px;">날짜/시간</th>
                        <th style="width: 100px;">구분</th>
                        <th>메시지</th>
                        <th style="width: 60px;">상태</th>
                    </tr>
                </thead>
                <tbody id="log-tbody">
                    </tbody>
            </table>
        </div>
    </section>

    <section class="footer-card remote-section">
        <div class="card-header">
            <span class="tab active">Robot 0 원격 제어</span>
            <label class="switch">
                <input type="checkbox" id="remote-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="remote-ui">
            <div class="d-pad">
                <button class="d-btn btn-up" onclick="moveOneMeter('up')">▲</button>
                <button class="d-btn btn-left" onclick="moveRobot('left')">◀</button>
                <div class="btn-center" onclick="moveRobot('stop')">●</div>
                <button class="d-btn btn-right" onclick="moveRobot('right')">▶</button>
                <button class="circle-btn btn-turnL" onclick="moveRobot('left')">⟲</button>
                <button class="d-btn btn-down" onclick="moveOneMeter('down')">▼</button>
                <button class="circle-btn btn-turnR" onclick="moveRobot('right')">⟳</button>
            </div>
        </div>
    </section>
</footer>

<style>
    /* 라이트 모드 푸터 레이아웃 */
    .footer-zone { display: flex; gap: 15px; padding: 15px; background: #f1f5f9; height: 320px; border-top: 1px solid #e2e8f0; }
    .log-section { flex: 7; }
    .remote-section { flex: 3; min-width: 320px; }

    .footer-card { background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; }
    .card-header { padding: 10px 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }

    /* 로그 스타일 */
    .log-table-wrapper { flex: 1; overflow-y: auto; background: #fff; max-height: 250px; }
    .log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .log-table td { padding: 6px 10px; border-bottom: 1px dotted #f1f5f9; font-family: 'JetBrains Mono', monospace; }
    .log-error { color: #ef4444; background: #fef2f2; font-weight: bold; }

    /* 원래 D-PAD 디자인 복원 */
    .remote-ui { flex: 1; display: flex; justify-content: center; align-items: center; }
    .d-pad { 
        display: grid; 
        grid-template-areas: 
            ". up ." 
            "left stop right" 
            "turnL down turnR"; 
        gap: 10px; 
    }
    .d-btn, .circle-btn { width: 55px; height: 55px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; font-size: 20px; cursor: pointer; }
    .btn-up { grid-area: up; } .btn-left { grid-area: left; } .btn-right { grid-area: right; } .btn-down { grid-area: down; }
    .btn-center { grid-area: stop; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #475569; cursor: pointer; }
    .circle-btn { border-radius: 50%; background: #f1f5f9; font-size: 18px; }
    .btn-turnL { grid-area: turnL; } .btn-turnR { grid-area: turnR; }
</style>
